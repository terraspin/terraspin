name: 'Terraspin Plan Analysis'
description: 'Analyze terraform plan output for risk intelligence'
author: 'Terraspin'
branding:
  icon: 'activity'
  color: 'green'

inputs:
  plan-file:
    description: 'Path to terraform plan JSON file'
    required: true
    default: 'plan.json'
  fail-on:
    description: 'Exit 1 if risk >= tier: critical|high|medium|low'
    required: false
    default: ''
  format:
    description: 'Output format: text|json|markdown'
    required: false
    default: 'markdown'
  llm-provider:
    description: 'LLM provider: claude|openai|ollama'
    required: false
    default: 'claude'
  no-ai:
    description: 'Skip LLM call (true/false)'
    required: false
    default: 'false'

runs:
  using: 'composite'
  steps:
    - name: Download Terraspin
      shell: bash
      run: |
        if ! command -v terraspin &>/dev/null; then
          echo "terraspin not found. Install from https://github.com/terraspin/terraspin/releases"
          exit 1
        fi

    - name: Run Terraspin analysis
      shell: bash
      env:
        ANTHROPIC_API_KEY: ${{ env.ANTHROPIC_API_KEY }}
        OPENAI_API_KEY: ${{ env.OPENAI_API_KEY }}
      run: |
        ARGS="${{ inputs.plan-file }} --format ${{ inputs.format }}"
        [ -n "${{ inputs.fail-on }}" ] && ARGS="$ARGS --fail-on ${{ inputs.fail-on }}"
        [ "${{ inputs.llm-provider }}" != "claude" ] && ARGS="$ARGS --llm ${{ inputs.llm-provider }}"
        [ "${{ inputs.no-ai }}" = "true" ] && ARGS="$ARGS --no-ai"
        terraspin $ARGS
