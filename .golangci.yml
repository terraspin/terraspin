# golangci-lint configuration for terraspin
# https://golangci-lint.run/usage/configuration/

version: "2"

linters:
  default: standard
  settings:
    errcheck:
      exclude-functions:
        - "(*net/http.Response).Body.Close"
        - os.Setenv
        - os.Unsetenv 
        - "(*encoding/json.Encoder).Encode"
        - "(net/http.ResponseWriter).Write"
        - "(io.ReadCloser).Close"
        - "(*os.File).Close"
        - "(*encoding/json.Decoder).Decode"
    staticcheck:
      checks:
        - all
        - "-SA1019"
        - "-ST1000"

formatters:
  enable: []
